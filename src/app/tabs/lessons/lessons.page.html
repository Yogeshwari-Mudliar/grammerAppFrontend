<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Lessons</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="lessons-page">

  <div class="lessons-container">

    <h1>Course Lessons</h1>

    <ion-list>
      @for (lesson of lessons; track lesson; let i = $index) {
        <ion-item class="lesson-item" lines="none">
          <div class="lesson-content">
            <div class="lesson-info">
              <h3>{{ lesson.title }}</h3>
              <p>{{ lesson.duration }}</p>
            </div>
            <div class="lesson-status">
              @if (lesson.completed) {
                <ion-icon name="checkmark-circle" color="success"></ion-icon>
                <span class="completed-text">Completed</span>
              } @else {
                <ion-icon name="play-circle" color="primary"></ion-icon>
                <span class="pending-text">Start</span>
              }
            </div>
          </div>
          <ion-button fill="clear" slot="end" [disabled]="lesson.completed">
            <ion-icon name="play" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-item>
      }
    </ion-list>

  </div>

</ion-content>
