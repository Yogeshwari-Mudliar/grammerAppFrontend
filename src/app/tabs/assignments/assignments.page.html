<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Assignments</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="assignments-page">

  <div class="assignments-container">

    <h1>My Assignments</h1>

    <ion-list>
      @for (assignment of assignments; track assignment) {
        <ion-item class="assignment-item" lines="none">
          <div class="assignment-content">
            <div class="assignment-info">
              <h3>{{ assignment.title }}</h3>
              <p>Due: {{ assignment.dueDate }}</p>
            </div>
            <div class="assignment-status">
              @if (assignment.submitted) {
                <ion-chip color="success">
                  <ion-icon name="checkmark-circle"></ion-icon>
                  <ion-label>Submitted</ion-label>
                </ion-chip>
              } @else {
                <ion-chip color="warning">
                  <ion-icon name="time"></ion-icon>
                  <ion-label>Pending</ion-label>
                </ion-chip>
              }
            </div>
          </div>
          @if (!assignment.submitted) {
            <ion-button fill="clear" slot="end">
              <ion-icon name="paper-plane" slot="icon-only"></ion-icon>
            </ion-button>
          }
        </ion-item>
      }
    </ion-list>

  </div>

</ion-content>
